<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent Pizza Marketplace</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">AI Agent Pizza</p>
          <h1>PIZZA TOOL LIST</h1>
          <p class="hero-text">
            AI가 수행가능한 업무를 빠르게 찾아보세요.
          </p>
        </div>
      </header>

      <main class="marketplace">
        <section class="page-tabs card">
          <button class="page-tab active" type="button" data-page-tab="tools">도구 목록</button>
          <button class="page-tab" type="button" data-page-tab="history">대화 이력</button>
        </section>

        <section class="page-panel active" id="toolsPanel">
        <section class="toolbar card">
          <div class="toolbar-copy">
            <p class="eyebrow">Tools</p>
            <h2>도구 탐색</h2>
          </div>

          <div class="search-row">
            <input id="searchInput" type="search" placeholder="도구 이름, 설명, 팀, key로 검색" />
            <select id="sortSelect" aria-label="정렬 기준">
              <option value="usecount_desc">사용량 많은 순</option>
              <option value="toolname_asc">도구명 오름차순</option>
            </select>
          </div>

          <div class="chip-row" id="chipRow">
            <button class="chip active" data-filter="all">전체</button>
          </div>
        </section>

        <section class="results-head">
          <div>
            <p class="results-label">Results</p>
            <h3 id="resultsTitle">전체 도구</h3>
          </div>
          <p class="results-meta" id="resultsMeta">0개 도구</p>
        </section>

        <section class="grid" id="toolGrid"></section>
        </section>

        <section class="page-panel" id="historyPanel">
          <section class="history-shell card">
            <div class="history-head">
              <div>
                <p class="eyebrow">History</p>
                <h2>대화 이력</h2>
              </div>
              <p class="history-meta" id="historyMeta">0개 대화</p>
            </div>

            <div class="history-toolbar">
              <input id="historySearchInput" type="search" placeholder="대화 제목, 질문, 답변, tool로 검색" />
              <div class="history-filter-row">
                <select id="historyToolFilter" aria-label="대화 이력 tool 필터">
                  <option value="all">전체 TOOL</option>
                </select>
                <select id="historySkillFilter" aria-label="대화 이력 skill 필터">
                  <option value="all">전체 SKILL</option>
                </select>
                <select id="historySkillUsageFilter" aria-label="대화 이력 skill 사용 여부 필터">
                  <option value="all">SKILL 사용 전체</option>
                  <option value="used">SKILL 사용</option>
                  <option value="unused">SKILL 없음</option>
                </select>
              </div>
            </div>

            <div class="history-list" id="historyList"></div>
          </section>
        </section>
      </main>
    </div>

    <div class="modal hidden" id="toolModal" role="dialog" aria-modal="true" aria-labelledby="modalToolName">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <section class="modal-content card">
        <div class="modal-toolbar">
          <div class="modal-context-left">
            <span id="modalCategory" class="modal-category-chip">-</span>
            <span id="modalUsecount" class="modal-usecount-chip">use -</span>
          </div>
          <button class="modal-close" id="modalCloseBtn" aria-label="닫기" type="button">닫기</button>
        </div>

        <div class="modal-title-row">
          <div>
            <p class="modal-kicker">Detail</p>
            <h3 id="modalToolName">-</h3>
          </div>
          <span id="modalDeveloper" class="modal-developer-inline">-</span>
        </div>

        <p id="modalDescription" class="modal-description">-</p>

        <div class="modal-tab-row">
          <button type="button" class="modal-tab active" data-tab="api">API Payload</button>
          <button type="button" class="modal-tab" data-tab="source">Python Sample</button>
        </div>

        <section class="modal-pane active" id="apiPane">
          <div class="detail-grid">
            <div class="detail-card">
              <p class="detail-label">Required Keys</p>
              <pre id="modalKeys">-</pre>
            </div>
            <div class="detail-card">
              <p class="detail-label">Query</p>
              <input id="apiQueryInput" class="api-query-input" type="text" placeholder="예: A라인 다운 설비 10분 이상 조회" />
            </div>
          </div>
          <div class="code-card">
            <div class="code-head">
              <p class="detail-label">POST payload</p>
              <button class="btn ghost" id="copyApiBtn" type="button">복사</button>
            </div>
            <pre id="apiPayloadPreview">-</pre>
            <span id="copyApiStatus" class="copy-status" aria-live="polite"></span>
          </div>
        </section>

        <section class="modal-pane" id="sourcePane">
          <div class="code-card">
            <div class="code-head">
              <p class="detail-label">Python example</p>
              <button class="btn ghost" id="copySourceBtn" type="button">복사</button>
            </div>
            <pre id="sourceCodePreview">-</pre>
            <span id="copySourceStatus" class="copy-status" aria-live="polite"></span>
          </div>
        </section>
      </section>
    </div>

    <script src="./src/app.js"></script>
  </body>
</html>
